<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        // Immediate check to redirect authenticated users
        if (localStorage.getItem('mvz_token') === '#MVZ01') {
            window.location.href = 'dashboard.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acesso restrito à Biblioteca de Prompts Exclusivos da Comunidade MVZ. Insira seu token de acesso.">
    <title>Acesso Restrito - Comunidade MVZ</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons for clean modern iconography -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body class="login-body">
    <!-- Decorative Tech Grid & Glow Orbs -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <!-- Login Page Wrap -->
    <div class="login-wrapper">
        <div class="login-card" id="loginCard">
            <!-- Glowing top accent bar -->
            <div class="card-glow-bar"></div>

            <!-- Pulsing Lock Header -->
            <div class="card-icon-header">
                <div class="icon-pulse-wrapper">
                    <div class="icon-pulse-ring"></div>
                    <div class="icon-pulse-dot"></div>
                    <i data-lucide="lock" class="lock-icon"></i>
                </div>
            </div>

            <!-- Brand Logo -->
            <div class="login-brand">
                <span class="logo-text">Comunidade <span>MVZ</span></span>
                <p class="login-subtitle">Biblioteca de Prompts Premium</p>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="tokenInput">Token de Acesso</label>
                    <div class="input-wrapper">
                        <i data-lucide="key-round" class="input-icon"></i>
                        <input 
                            type="text" 
                            id="tokenInput" 
                            placeholder="Digite seu token de acesso" 
                            required 
                            autocomplete="off"
                            spellcheck="false"
                        >
                        <button type="button" class="paste-btn" id="pasteBtn" title="Colar do clipboard">
                            <i data-lucide="clipboard"></i>
                            <span>Colar</span>
                        </button>
                    </div>
                </div>

                <!-- Error Container -->
                <div class="error-container" id="errorContainer" style="display: none;">
                    <i data-lucide="alert-circle" class="error-icon"></i>
                    <span id="errorMessage">Token de acesso inválido!</span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Entrar no Portal</span>
                    <i data-lucide="log-in" class="btn-icon"></i>
                </button>
            </form>

            <div class="login-footer">
                <p>Esqueceu seu token ou precisa de suporte? <br>Contate a equipe da Comunidade MVZ.</p>
            </div>
        </div>
    </div>

    <!-- Login Logic -->
    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        const loginForm = document.getElementById('loginForm');
        const tokenInput = document.getElementById('tokenInput');
        const loginCard = document.getElementById('loginCard');
        const errorContainer = document.getElementById('errorContainer');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Clean up previous states
            loginCard.classList.remove('shake');
            errorContainer.style.display = 'none';
            
            const enteredToken = tokenInput.value.trim();

            // Validate token exactly
            if (enteredToken === '#MVZ01') {
                // Success
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;
                
                // Add success visual feedback
                loginCard.classList.add('success-fade');
                
                // Save session in local storage
                localStorage.setItem('mvz_token', '#MVZ01');
                
                // Redirect after short fade transition
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 600);
            } else {
                // Failure
                errorMessage.textContent = 'Token de acesso inválido. Tente novamente!';
                errorContainer.style.display = 'flex';
                
                // Trigger shake animation
                loginCard.classList.add('shake');
                
                // Focus and select input text for quick correction
                tokenInput.focus();
                tokenInput.select();
            }
        });

        // Remove shake class after animation ends
        loginCard.addEventListener('animationend', (e) => {
            if (e.animationName === 'shake') {
                loginCard.classList.remove('shake');
            }
        });

        // Paste button functionality
        const pasteBtn = document.getElementById('pasteBtn');
        pasteBtn.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                tokenInput.value = text;
                tokenInput.focus();
            } catch (err) {
                console.error('Falha ao ler o clipboard: ', err);
                // Fallback: focus input for manual pasting
                tokenInput.focus();
            }
        });
    </script>
</body>
</html>
